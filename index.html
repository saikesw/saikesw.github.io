<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year Confession</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 24px;
        }

        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://th.bing.com/th/id/OIG3.jFjkeuNPtfnkHF0F8m9h?pid=ImgGn') center/cover fixed;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        #inputContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #inputCode {
            margin-top: 20px;
            padding: 10px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 5px;
            transition: box-shadow 0.3s ease;
            width: 200px; /* Adjust the width as needed */
        }

        #inputCode:focus {
            box-shadow: 0 0 10px rgba(255, 223, 0, 0.8);
            outline: none;
        }

        #okButton {
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #okButton:hover {
            background-color: #45a049;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var currentDate = new Date();
            var targetDate = new Date('2024-02-09T23:50:00');
            var typingSpeed = 100; // Adjust typing speed in milliseconds

            if (currentDate < targetDate) {
                document.body.style.background = "url('https://th.bing.com/th/id/OIG3.cj4Q.I0IjILH0R.7bzO1?pid=ImgGn') center/cover fixed";
                simulateTyping("来早了哦，要慢慢等待哦");
            } else {
                var popup = document.createElement('div');
                popup.id = 'popup';
                document.body.appendChild(popup);

                popup.style.display = 'flex';

                var inputContainer = document.createElement('div');
                inputContainer.id = 'inputContainer';
                popup.appendChild(inputContainer);

                var inputCode = document.createElement('input');
                inputCode.id = 'inputCode';
                inputCode.placeholder = '请输入访问码';
                inputContainer.appendChild(inputCode);

                var okButton = document.createElement('button');
                okButton.id = 'okButton';
                okButton.innerHTML = '确定';
                inputContainer.appendChild(okButton);

                okButton.addEventListener('click', function () {
                    var accessCode = inputCode.value.trim().toLowerCase();
                    var message = "";

                    if (accessCode === 'cms') {
                        var newYearMessage = "你果然来啦！首先，祝你新年快乐哦！其次，超级爱你的（biu~）";
                        var currentDateAfter = new Date('2024-02-10T02:00:00');

                        if (currentDate > currentDateAfter) {
                            message = "你怎么来晚啦，不过，还是要祝你新年快乐的，并且，依然超级爱你的！";
                            document.body.style.background = "url('https://th.bing.com/th/id/OIG3.MfgyUug9DSgQWtSt016i?pid=ImgGn') center/cover fixed";
                        } else {
                            message = newYearMessage;
                            document.body.style.background = "url('https://th.bing.com/th/id/OIG3.kh7s8NOKM35ejLxIynW7?pid=ImgGn') center/cover fixed";
                        }
                    } else {
                        message = "新年快乐！";
                    }

                    popup.style.display = 'none';
                    simulateTyping(message);
                });

                inputCode.addEventListener('focus', function () {
                    inputCode.style.boxShadow = "0 0 10px rgba(255, 223, 0, 0.8)";
                });

                inputCode.addEventListener('blur', function () {
                    inputCode.style.boxShadow = "none";
                });
            }

            function simulateTyping(text) {
                var index = 0;
                var interval = setInterval(function () {
                    document.body.innerHTML = text.slice(0, index);
                    index++;
                    if (index > text.length) {
                        clearInterval(interval);
                    }
                }, typingSpeed);
            }
        });
    </script>
</head>

<body>
    <!-- 页面内容可以添加在这里 -->
</body>

</html>
