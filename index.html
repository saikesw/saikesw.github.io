<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-size: cover;
            background-position: center;
        }        
        .search-container {
            width: 60%;
            display: flex;
            align-items: center;
            border-radius: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 10px;
        }        
        .search-input {
            flex: 1;
            font-size: 16px;
            padding: 10px;
            border: none;
            border-radius: 20px;
            outline: none;
        }        
        .search-button {
            background-color: #4285F4;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }        
        .google-text {
            font-size: 32px;
            font-weight: bold;
            margin-right: 10px;
        }        
        .google-text span:nth-child(1) {
            color: blue;
        }        
        .google-text span:nth-child(2) {
            color: red;
        }        
        .google-text span:nth-child(3) {
            color: yellow;
        }
        .google-text span:nth-child(4) {
            color: blue;
        }
        .google-text span:nth-child(5) {
            color: green;
        }
        .google-text span:nth-child(6) {
            color: red;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="google-text">
            <span>G</span>
            <span>o</span>
            <span>o</span>
            <span>g</span>
            <span>l</span>
            <span>e</span>
        </div>
        <input class="search-input" type="text" placeholder="Search in Google" id="search-input">
        <button class="search-button" onclick="search()">Search</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
