<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气程序</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .weather-container {
            position: relative;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }

        .weather-info {
            background-color: #3498db;
            color: #fff;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
        }

        .add-button {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 24px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
        }

        input {
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .modal-buttons {
            margin-top: 10px;
        }

        h1 {
            color: #3498db;
        }

        span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <h1>吴旺泽天气程序</h1>
        <div class="add-button" onclick="openModal()">+</div>
        <div class="weather-info" id="locationInfo"></div>
        <div class="weather-info">温度: <span id="temperature"></span> °C</div>
        <div class="weather-info">天气状况: <span id="weatherCondition"></span></div>
        <div class="weather-info">风速: <span id="windSpeed"></span> m/s</div>
        <div class="weather-info">风力等级: <span id="windForce"></span></div>
        <div class="weather-info">日出时间: <span id="sunriseTime"></span></div>
        <div class="weather-info">日落时间: <span id="sunsetTime"></span></div>
    </div>

    <div class="modal" id="myModal">
        <label for="locationInput">请输入地区:</label>
        <input type="text" id="locationInput">
        <div class="modal-buttons">
            <button onclick="addLocation()">确定</button>
            <button onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        function getRandomNumber(min, max) {
            return (Math.random() * (max - min) + min).toFixed(2);
        }

        function getRandomWeatherCondition() {
            const conditions = ['世界末日', '紫色雷电','白虹贯日','绿色风暴','台风',];
            return conditions[Math.floor(Math.random() * conditions.length)];
        }

        function getRandomTime() {
            const hours = Math.floor(Math.random() * 24);
            const minutes = Math.floor(Math.random() * 60);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        }

        function openModal() {
            document.getElementById('myModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }

        function addLocation() {
            const locationInput = document.getElementById('locationInput');
            const location = locationInput.value;
            if (location) {
                // Display only the latest location
                document.getElementById('locationInfo').innerHTML = `地区: <span>${location}</span>`;

                // Update weather data with more extreme values
                document.getElementById('temperature').innerText = getRandomNumber(150, 300);
                document.getElementById('weatherCondition').innerText = getRandomWeatherCondition();
                document.getElementById('windSpeed').innerText = getRandomNumber(10, 30);
                document.getElementById('windForce').innerText = Math.floor(getRandomNumber(6, 12));
                document.getElementById('sunriseTime').innerText = getRandomTime();
                document.getElementById('sunsetTime').innerText = getRandomTime();
                
                // Close the modal
                closeModal();
            }
        }
    </script>
</body>
</html>
